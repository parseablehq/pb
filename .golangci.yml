version: 2

linters:
  disable-all: true
  settings:
    errcheck:
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - (io.Closer).Close
  enable:
    - misspell
    - govet
    # - revive
    - ineffassign
    - gomodguard
    - unused
    - nilnesserr 

linters-settings:
  golint:
    min-confidence: 0
  govet:
    enable:
      - typecheck
  misspell:
    locale: US

issues:
  exclude-use-default: false
  exclude:
    - instead of using struct literal
    - should have a package comment
    - should have comment or be unexported
    - time-naming
    - error strings should not be capitalized or end with punctuation or a newline
